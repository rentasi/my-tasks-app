<!DOCTYPE html>
<html>
<head>
    <title>Login - Community Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --main-orange: #e67e22; --bg-cream: #fffaf0; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-cream); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        h2 { color: var(--main-orange); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--main-orange); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .guest-btn { background: #95a5a6; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>COMMUNITY TASKS</h2>
        <p>おかえりなさい！</p>
        
        <form action="/login" method="POST">
            <input type="text" name="user_name" placeholder="ユーザー名" required>
            <input type="password" name="password" placeholder="パスワード" required>
            <button type="submit">ログイン</button>
        </form>

        <div class="link" style="margin-top: 15px; font-size: 13px; text-align: center;">
            初めてですか？ <a href="/signup" style="color: #e67e22; text-decoration: none; font-weight: bold;">アカウント作成はこちら</a>
        </div>

    </div>
</body>
</html>
